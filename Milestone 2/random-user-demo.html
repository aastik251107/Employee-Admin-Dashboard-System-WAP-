<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random User Fetch Demo</title>
  <link rel="stylesheet" href="./random-user-demo.css" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <p class="eyebrow">API Demo</p>
      <h1>Random User Directory</h1>
      <p class="subtitle">
        Fetch and display user data from
        <a href="https://randomuser.me/" target="_blank" rel="noreferrer">randomuser.me</a>
      </p>
      <div class="controls">
        <button id="load-users-btn" class="button">Load Users</button>
        <button id="refresh-users-btn" class="button button-secondary">Refresh</button>
      </div>
    </section>

    <section id="status" class="status" aria-live="polite">
      Click the button to fetch users.
    </section>

    <section id="user-list" class="user-grid" aria-live="polite"></section>
  </main>

  <script src="./random-user-demo.js"></script>
</body>
</html>
